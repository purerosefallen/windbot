stages:
  - build
  - deploy
  
variables:
  GIT_DEPTH: "1"

.docker-op:
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

.build-image:
  extends: .docker-op
  stage: build
  script:
    - docker build --pull --no-cache -t $TARGET_IMAGE .
    - docker push $TARGET_IMAGE

build:
  stage: build
  dependencies: []
  tags:
    - linux
  image: mono
  script:
    - sed -i -e '/download.mono-project.com/d' -e 's/deb.debian.org/archive.debian.org/g' /etc/apt/sources.list /etc/apt/sources.list.d/*
    - apt update && apt -y install p7zip-full tar
    - msbuild /p:Configuration=Release /p:TargetFrameworkVersion=v4.6
    - mv -f bin/Release WindBot
    #- rm -rf WindBot/WindBot.exe.config
    - mv -f BotWrapper/bin/Release/Bot.exe .
    - mv -f BotWrapper/bin/Release/bot.conf .
    - mv -f BotWrapper/BotWrapper.sh ./bot
    - chmod +x ./bot
    - mkdir dist
    - 7z a -mx9 dist/WindBot.7z WindBot Bot.exe bot.conf
    - mv WindBot windbot
    - tar zcvf dist/windbot.tar.gz windbot bot.conf bot
  artifacts:
    paths:
      - dist/

build-x86:
  extends: .build-image
  tags:
    - docker
  variables:
    TARGET_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG-x86

build-arm:
  extends: .build-image
  tags:
    - docker-arm
  variables:
    TARGET_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG-arm

upload_to_minio:
  stage: deploy
  dependencies:
    - build
  tags: 
    - linux
  script:
    - aws s3 --endpoint=https://minio.moenext.com:9000 sync dist/ s3://mycard/windbot
  only:
    - master

.deploy:
  extends: .docker-op
  stage: deploy
  tags:
    - docker
  script:
    - docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG-x86
    - docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG-arm
    - docker manifest create $TARGET_IMAGE --amend $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG-x86 --amend
      $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG-arm
    - docker manifest push $TARGET_IMAGE

deploy_latest:
  extends: .deploy
  variables:
    TARGET_IMAGE: $CI_REGISTRY_IMAGE:latest
  only:
    - master

deploy_branch:
  extends: .deploy
  variables:
    TARGET_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
